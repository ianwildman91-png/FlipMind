<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlipMind — AI Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F0E8;
      --bg2: #EDE8DF;
      --card: #FDFAF5;
      --ink: #1A1714;
      --ink2: #6B6560;
      --ink3: #A09B96;
      --green: #1D6B4A;
      --green-bg: #E4F2EB;
      --red: #B8341A;
      --red-bg: #FAECE7;
      --accent: #C4773A;
      --border: rgba(26,23,20,0.1);
      --border2: rgba(26,23,20,0.06);
      --radius: 16px;
      --shadow: 0 2px 16px rgba(26,23,20,0.08);
      --shadow-lg: 0 8px 40px rgba(26,23,20,0.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border2);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--accent); font-style: italic; }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink2);
    }

    .streak-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    main {
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 2.5rem 1.5rem 4rem;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2.5rem;
    }

    .topic-btn {
      padding: 8px 18px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--ink2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .topic-btn:hover { border-color: rgba(26,23,20,0.25); color: var(--ink); }

    .topic-btn.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 2rem;
    }

    .score-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }

    .score-label {
      font-size: 11px;
      color: var(--ink3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .score-value {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      line-height: 1;
    }

    .score-value.green { color: var(--green); }
    .score-value.red { color: var(--red); }

    .flashcard-area {
      perspective: 1200px;
      height: 260px;
      margin-bottom: 1.25rem;
      cursor: pointer;
    }

    .flashcard-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .flashcard-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      box-shadow: var(--shadow);
    }

    .card-back-face {
      transform: rotateY(180deg);
      background: var(--bg2);
    }

    .card-eyebrow {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .card-question {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      text-align: center;
      color: var(--ink);
      line-height: 1.45;
      max-width: 500px;
    }

    .card-hint {
      position: absolute;
      bottom: 1.25rem;
      font-size: 12px;
      color: var(--ink3);
    }

    .card-answer {
      font-size: 15px;
      text-align: center;
      color: var(--ink2);
      line-height: 1.7;
      max-width: 500px;
    }

    .loading-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink3);
      margin: 0 3px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.9); } 40% { opacity: 1; transform: scale(1.1); } }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .btn {
      padding: 11px 22px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      font-weight: 400;
      transition: all 0.15s;
      box-shadow: var(--shadow);
    }

    .btn:hover { background: var(--bg2); }
    .btn:disabled { opacity: 0.3; cursor: default; box-shadow: none; }

    .btn-primary {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .btn-primary:hover { background: #2e2b28; }

    .score-actions {
      display: none;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .btn-got { background: var(--green-bg); color: var(--green); border-color: rgba(29,107,74,0.25); box-shadow: none; }
    .btn-got:hover { background: #d0eadb; }
    .btn-missed { background: var(--red-bg); color: var(--red); border-color: rgba(184,52,26,0.25); box-shadow: none; }
    .btn-missed:hover { background: #f5ddd7; }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.5rem;
    }

    .card-counter { font-size: 13px; color: var(--ink3); }

    .reset-btn {
      font-size: 12px;
      color: var(--ink3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .reset-btn:hover { color: var(--ink2); }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 12px;
      color: var(--ink3);
      border-top: 1px solid var(--border2);
    }

    @media (max-width: 480px) {
      header { padding: 1rem 1.25rem; }
      main { padding: 1.5rem 1rem 3rem; }
      .score-grid { grid-template-columns: repeat(2, 1fr); }
      .card-question { font-size: 1.15rem; }
      .flashcard-area { height: 230px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Flip<span>Mind</span></div>
  <div class="streak-badge">
    <div class="streak-dot"></div>
    <span id="streak-label">0 streak</span>
  </div>
</header>

<main>
  <p class="section-title">Choose a topic</p>
  <div class="topics">
    <button class="topic-btn active" data-topic="History">History</button>
    <button class="topic-btn" data-topic="Philosophy">Philosophy</button>
    <button class="topic-btn" data-topic="Law">Law</button>
    <button class="topic-btn" data-topic="Business">Business</button>
    <button class="topic-btn" data-topic="Science">Science</button>
    <button class="topic-btn" data-topic="Economics">Economics</button>
    <button class="topic-btn" data-topic="Psychology">Psychology</button>
    <button class="topic-btn" data-topic="Art">Art</button>
    <button class="topic-btn" data-topic="Mathematics">Mathematics</button>
    <button class="topic-btn" data-topic="Literature">Literature</button>
  </div>

  <div class="score-grid">
    <div class="score-card">
      <div class="score-label">Got it</div>
      <div class="score-value green" id="s-correct">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Missed</div>
      <div class="score-value red" id="s-missed">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Accuracy</div>
      <div class="score-value" id="s-pct">—</div>
    </div>
    <div class="score-card">
      <div class="score-label">Cards</div>
      <div class="score-value" id="s-total">0</div>
    </div>
  </div>

  <div class="flashcard-area" id="card-area" onclick="flipCard()">
    <div class="flashcard-inner" id="card-inner">
      <div class="card-face">
        <div class="card-eyebrow" id="topic-label">History</div>
        <div class="card-question" id="q-text">Press "New Card" to begin</div>
        <div class="card-hint" id="flip-hint">tap to reveal answer</div>
      </div>
      <div class="card-face card-back-face">
        <div class="card-eyebrow">Answer</div>
        <div class="card-answer" id="a-text"></div>
      </div>
    </div>
  </div>

  <div class="score-actions" id="score-actions">
    <button class="btn btn-missed" onclick="markCard(false)">✕ Missed it</button>
    <button class="btn btn-got" onclick="markCard(true)">✓ Got it</button>
  </div>

  <div class="controls" id="nav-controls">
    <button class="btn" id="prev-btn" onclick="prevCard()" disabled>← Prev</button>
    <button class="btn btn-primary" id="new-btn" onclick="loadCard()">New Card</button>
    <button class="btn" id="next-btn" onclick="nextCard()" disabled>Next →</button>
  </div>

  <div class="bottom-row">
    <span class="card-counter" id="card-counter"></span>
    <button class="reset-btn" onclick="resetScore()">Reset score</button>
  </div>
</main>

<footer>
  FlipMind — powered by AI · Study smarter, not harder
</footer>

<script>
  const GEMINI_API_KEY = 'AIzaSyA6d58RaDT2XUv4IU5z3aEjOgESCTqHxHs';

  let topic = 'History';
  let cards = [];
  let idx = -1;
  let flipped = false;
  let loading = false;
  let correct = 0, missed = 0, streak = 0;

  document.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      topic = btn.dataset.topic;
      cards = []; idx = -1;
      resetCard('Press "New Card" to begin', '');
      updateNav();
    });
  });

  function resetCard(q, a) {
    flipped = false;
    document.getElementById('card-inner').classList.remove('flipped');
    document.getElementById('q-text').innerHTML = q;
    document.getElementById('a-text').textContent = a;
    document.getElementById('topic-label').textContent = topic;
    document.getElementById('flip-hint').style.display = '';
    document.getElementById('score-actions').style.display = 'none';
    document.getElementById('nav-controls').style.display = 'flex';
  }

  function flipCard() {
    if (!document.getElementById('a-text').textContent || loading) return;
    if (!flipped) {
      flipped = true;
      document.getElementById('card-inner').classList.add('flipped');
      document.getElementById('flip-hint').style.display = 'none';
      if (cards[idx] && !cards[idx].scored) {
        document.getElementById('score-actions').style.display = 'flex';
        document.getElementById('nav-controls').style.display = 'none';
      }
    }
  }

  function markCard(gotIt) {
    if (cards[idx] && !cards[idx].scored) {
      cards[idx].scored = true;
      if (gotIt) { correct++; streak++; } else { missed++; streak = 0; }
      updateScores();
    }
    document.getElementById('score-actions').style.display = 'none';
    document.getElementById('nav-controls').style.display = 'flex';
  }

  function updateScores() {
    document.getElementById('s-correct').textContent = correct;
    document.getElementById('s-missed').textContent = missed;
    const total = correct + missed;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-pct').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '—';
    document.getElementById('streak-label').textContent = streak + (streak === 1 ? ' streak' : ' streak');
  }

  function resetScore() {
    correct = 0; missed = 0; streak = 0;
    cards.forEach(c => { c.scored = false; delete c.gotIt; });
    updateScores();
  }

  function updateNav() {
    document.getElementById('prev-btn').disabled = idx <= 0;
    document.getElementById('next-btn').disabled = idx >= cards.length - 1;
    document.getElementById('card-counter').textContent = cards.length > 0 ? `Card ${idx + 1} of ${cards.length}` : '';
  }

  async function loadCard() {
    if (loading) return;
    loading = true;
    document.getElementById('new-btn').disabled = true;
    resetCard('<div class="loading-dots"><span></span><span></span><span></span></div>', '');

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `You are a flashcard generator. Return ONLY a JSON object with "question" and "answer" fields. No markdown, no backticks, no extra text. Questions: 1-2 sentences. Answers: 2-4 sentences, clear and educational.\n\nGenerate one flashcard about ${topic}. JSON only: {"question":"...","answer":"..."}`
            }]
          }],
          generationConfig: { maxOutputTokens: 300, temperature: 0.9 }
        })
      });
      const data = await res.json();
      const text = data.candidates[0].content.parts[0].text;
      const card = JSON.parse(text.replace(/```json|```/g, '').trim());
      cards.push(card);
      idx = cards.length - 1;
      resetCard(card.question, card.answer);
      updateNav();
    } catch(e) {
      resetCard('Error loading card — check your API key and try again.', '');
    }

    loading = false;
    document.getElementById('new-btn').disabled = false;
  }

  function prevCard() { if (idx > 0) { idx--; resetCard(cards[idx].question, cards[idx].answer); updateNav(); } }
  function nextCard() { if (idx < cards.length - 1) { idx++; resetCard(cards[idx].question, cards[idx].answer); updateNav(); } }
</script>
</body>
</html>
